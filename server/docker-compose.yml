version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-commutepilot}
      POSTGRES_USER: ${DB_USER:-commutepilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_strong_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-commutepilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-commutepilot}
      DB_USER: ${DB_USER:-commutepilot}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_strong_password}
      JWT_SECRET: ${JWT_SECRET:-change_me_random_secret_key_64_chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      PORT: 3000
      NODE_ENV: production
      ADMIN_EMAIL: ${ADMIN_EMAIL:-7agtyadmin@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me_admin_password}
    ports:
      - "3000:3000"

volumes:
  pgdata:
